{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso TI - CESAR Status</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="body-login">
    <a href="{% url 'index' %}" class="btn-voltar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Voltar
    </a>
    
    <main class="login-container">
        <div class="login-cartao">

            <div class="login-header">
                <h2>CESAR School Status</h2>
            </div>

            <div class="login-conteudo">
                <div class="login-avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>

                <form method="post" class="forms-login">
                    {% csrf_token %}

                    <div class="grupo-input">
                        <input type="text" name="username" placeholder="Digite seu Email:" required>
                    </div>
                    <div class="grupo-input">
                        <input type="password" name="password" placeholder="Digite sua senha:" required>
                    </div>

                    {% if form.errors %}
                        <p class="erro-login">E-mail ou Senha incorreto</p>
                    {% endif %}

                    <button type="submit" class="btn-entrar">Entrar</button>
                </form>
            </div>

        </div>
    </main>
</body>
</html>
