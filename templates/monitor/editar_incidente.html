{% extends 'monitor/base.html' %}
{% load static %}

{% block content %}
<main class="container-reporte">
    <div class="voltar-reporte">
        <a href="{% url 'gerenciar_incidentes' %}" class="btn-voltar">Voltar</a>
    </div>

    <div class="cartao-reporte">
        <h2>Editar Incidente</h2>

        <form method="POST">
            {% csrf_token %}
            <div class="colunas-grid">
                <div class="coluna">

                    <label>Sistema</label>
                    <select name="sistema">
                        {% for valor, label in sistemas %}
                            <option value="{{ valor }}" {% if incidente.sistema == valor %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>

                    <label>Status</label>
                    <select name="status">
                        {% for valor, label in status_choices %}
                            <option value="{{ valor }}" {% if incidente.status == valor %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>

                    <label>Prioridade</label>
                    <select name="prioridade">
                        {% for valor, label in prioridades %}
                            <option value="{{ valor }}" {% if incidente.prioridade == valor %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>

                </div>

                <div class="coluna">
                    <label>Descrição</label>
                    <textarea name="descricao" rows="5">{{ incidente.descricao }}</textarea>
                </div>
            </div>

            <div class="btn-container" style="gap: 15px;">
                <button type="submit" name="acao" value="salvar" class="btn-enviar">Salvar Alterações</button>
                <button type="submit" name="acao" value="resolver" class="btn-enviar" style="background-color: #4CAF50; color: white;">Marcar como Resolvido</button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
